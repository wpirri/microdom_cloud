# ============================================
# 1. PersistentVolumeClaim (logs persistentes)
# ============================================
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: microdom-logs-pvc
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
  storageClassName: local-path
---
# ============================================
# 2. ConfigMap (configuración no sensible)
# ============================================
apiVersion: v1
kind: ConfigMap
metadata:
  name: microdom-config
data:
  microdom.conf:
    REMOTE_HOST=witchblade.com.ar
    REMOTE_PORT=443
    REMOTE_PROTO=https

---
# ============================================
# 3. Service (ClusterIP en puerto 8082)
# ============================================
apiVersion: v1
kind: Service
metadata:
  name: microdom-service-cloud
  labels:
    app: microdom-cloud
spec:
  type: NodePort
  selector:
    app: microdom-cloud
  ports:
    - name: http
      nodePort: 30143
      port: 8082
      targetPort: 8082
---
# ============================================
# 4. Ingress (host → puerto 8082)
# ============================================
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: microdom-ingress
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
spec:
  ingressClassName: nginx
  rules:
    - host: microdom.witchblade.com.ar
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: microdom-service-cloud
                port:
                  number: 8082
---
# ============================================
# 5. Deployment (limpio, optimizado, sin subPaths)
# ============================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: microdom-cloud
  labels:
    app: microdom-cloud
    tier: backend
    version: "1.0"
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app: microdom-cloud
  template:
    metadata:
      labels:
        app: microdom-cloud
        tier: backend
    spec:
      serviceAccountName: default
      terminationGracePeriodSeconds: 10

      containers:
        - name: microdom-cloud
          image: ghcr.io/wpirri/microdom-cloud:latest
          imagePullPolicy: Always

          # 🔥 Variables de entorno desde el Secret
          env:
            - name: DBHOST
              valueFrom:
                secretKeyRef:
                  name: microdom
                  key: DBHOST

            - name: DBNAME
              valueFrom:
                secretKeyRef:
                  name: microdom
                  key: DBNAME

            - name: DBUSER
              valueFrom:
                secretKeyRef:
                  name: microdom
                  key: DBUSER

            - name: DBPASSWORD
              valueFrom:
                secretKeyRef:
                  name: microdom
                  key: DBPASSWORD
          ports:
            - containerPort: 8082

          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"

          # 🔥 Solo logs y configMap, sin Secret mounts
          volumeMounts:
            - name: logs
              mountPath: /app/logs
            - name: etc
              mountPath: /app/etc
            - name: html-volume
              mountPath: /app/html
            - name: download-volume
              mountPath: /app/download
            - name: upload-volume
              mountPath: /app/upload
          livenessProbe:
            httpGet:
              path: /health
              port: 8082
            initialDelaySeconds: 5
            periodSeconds: 10

          readinessProbe:
            httpGet:
              path: /health
              port: 8082
            initialDelaySeconds: 3
            periodSeconds: 5

      volumes:
        - name: logs
          persistentVolumeClaim:
            claimName: microdom-logs-pvc

        - name: etc
          configMap:
            name: microdom-config

        - name: html-volume
          hostPath:
            path: /var/lib/microdom/html
            type: DirectoryOrCreate
        - name: download-volume
          hostPath:
            path: /var/lib/microdom/download
            type: DirectoryOrCreate
        - name: upload-volume
          hostPath:
            path: /var/lib/microdom/upload
            type: DirectoryOrCreate
      imagePullSecrets:
        - name: ghcr
---
# ============================================
# 6. Secret (credenciales)
# ============================================
apiVersion: v1
kind: Secret
metadata:
  name: microdom
type: Opaque
stringData:
  DBUSER: "dompi_cloud"
  DBPASSWORD: "dompi_cloud"
  DBHOST: "192.168.10.32"
  DBNAME: "DB_DOMPICLOUD"
  